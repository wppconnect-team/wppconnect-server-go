services:
  wppconnect-go:
    container_name: wpp-server-go
    image: wppconnect/wppconnect-server-go:${WPP_SERVER_GO_TAG:-latest}
    restart: unless-stopped
    environment:
      PORT: "21465"
      SECRET_KEY: "${SECRET_KEY:-THISISMYSECURETOKEN}"
      WEBHOOK_URL: "${WEBHOOK_URL:-}"
      DATA_DIR: "/data"
    volumes:
      - wpp_go_data:/data
    ports:
      - "21465:21465"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:$${PORT:-21465}/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  wpp_go_data: {}
